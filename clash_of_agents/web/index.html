<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clash-of-Agents - Replay Viewer</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #222;
            color: #eee;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1 { margin-bottom: 20px; }
        .container {
            background: #333;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        canvas {
            border: 2px solid #555;
            background-color: #4CAF50; /* Grass green */
            cursor: crosshair;
        }
        .controls {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: center;
        }
        button {
            padding: 8px 16px;
            background: #007bff;
            border: none;
            color: white;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover { background: #0056b3; }
        input[type="range"] { width: 400px; }
        #status { margin-bottom: 10px; color: #aaa; }
    </style>
</head>
<body>
    <h1>🤖 Clash-of-Agents - Replay Viewer</h1>
    
    <div class="container">
        <div id="status">Select a replay.json file to watch the battle.</div>
        <input type="file" id="fileInput" accept=".json" style="margin-bottom: 15px;">
        
        <div>
            <canvas id="gameCanvas" width="800" height="400"></canvas>
        </div>
        
        <div class="controls">
            <button id="playBtn">▶ Play</button>
            <button id="pauseBtn">⏸ Pause</button>
            <input type="range" id="timeline" min="0" max="0" value="0">
            <span id="tickDisplay">Tick: 0</span>
        </div>
        <div style="margin-top: 10px; font-size: 0.9em; color: #888;">
            Blue Base (Left) vs Red Base (Right)
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const status = document.getElementById('status');
        const timeline = document.getElementById('timeline');
        const tickDisplay = document.getElementById('tickDisplay');
        const playBtn = document.getElementById('playBtn');
        const pauseBtn = document.getElementById('pauseBtn');

        let replayData = null;
        let currentTick = 0;
        let isPlaying = false;
        let animationId = null;
        const FPS = 10; // Slowed down from 30 to 10 for better visibility

        // Grid Config
        const GRID_W = 20;
        const GRID_H = 3;
        const CELL_SIZE = 80; // 20 * 80 = 1600 width
        const CANVAS_W = 1200;
        const CANVAS_H = 300;
        
        // Update Canvas Size
        canvas.width = CANVAS_W;
        canvas.height = CANVAS_H;

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    replayData = JSON.parse(e.target.result);
                    status.textContent = `Loaded match: ${replayData.match_id} (${replayData.ticks.length} ticks)`;
                    timeline.max = replayData.ticks.length - 1;
                    currentTick = 0;
                    timeline.value = 0;
                    render(0);
                } catch (err) {
                    status.textContent = "Error parsing JSON: " + err.message;
                }
            };
            reader.readAsText(file);
        });

        playBtn.addEventListener('click', () => {
            if (!replayData) return;
            if (isPlaying) return;
            isPlaying = true;
            loop();
        });

        pauseBtn.addEventListener('click', () => {
            isPlaying = false;
            cancelAnimationFrame(animationId);
        });

        timeline.addEventListener('input', (e) => {
            if (!replayData) return;
            currentTick = parseInt(e.target.value);
            render(currentTick);
        });

        function loop() {
            if (!isPlaying) return;
            
            currentTick++;
            if (currentTick >= replayData.ticks.length) {
                currentTick = 0; // Loop or stop? Let's stop
                isPlaying = false;
                return;
            }
            
            timeline.value = currentTick;
            render(currentTick);
            
            // Throttling for speed control could be added here
            setTimeout(() => {
                animationId = requestAnimationFrame(loop);
            }, 1000 / FPS);
        }

        function render(tickIndex) {
            tickDisplay.textContent = `Tick: ${tickIndex}`;
            
            // Clear
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw Lanes
            ctx.strokeStyle = 'rgba(255,255,255,0.2)';
            ctx.lineWidth = 1;
            const LANE_HEIGHT = CANVAS_H / GRID_H;
            const COL_WIDTH = CANVAS_W / GRID_W;

            for (let y = 0; y <= GRID_H; y++) {
                ctx.beginPath();
                ctx.moveTo(0, y * LANE_HEIGHT);
                ctx.lineTo(CANVAS_W, y * LANE_HEIGHT);
                ctx.stroke();
            }
            // Vertical lines
             for (let x = 0; x <= GRID_W; x++) {
                ctx.beginPath();
                ctx.moveTo(x * COL_WIDTH, 0);
                ctx.lineTo(x * COL_WIDTH, CANVAS_H);
                ctx.stroke();
            }

            // Draw Base Areas (Background)
            // Blue Base Area (Col 0)
            ctx.fillStyle = 'rgba(0, 0, 255, 0.1)';
            ctx.fillRect(0, 0, COL_WIDTH, CANVAS_H);
            // Red Base Area (Col 19)
            ctx.fillStyle = 'rgba(255, 0, 0, 0.1)';
            ctx.fillRect((GRID_W - 1) * COL_WIDTH, 0, COL_WIDTH, CANVAS_H);
            
            // Build Zones (First 5 cols)
            ctx.fillStyle = 'rgba(0, 0, 255, 0.05)';
            ctx.fillRect(COL_WIDTH, 0, COL_WIDTH * 4, CANVAS_H); // Col 1-4
            
            ctx.fillStyle = 'rgba(255, 0, 0, 0.05)';
            ctx.fillRect((GRID_W - 5) * COL_WIDTH, 0, COL_WIDTH * 4, CANVAS_H); // Col 15-18

            if (!replayData || !replayData.ticks[tickIndex]) return;

            const state = replayData.ticks[tickIndex];

            // Draw Entities
            state.entities.forEach(e => {
                // Calculate position based on grid
                const x = e.x * COL_WIDTH;
                const y = e.y * LANE_HEIGHT;
                const w = e.width * COL_WIDTH;
                const h = e.height * LANE_HEIGHT;
                
                // Color
                let color = e.team === 'blue' ? '#4488ff' : '#ff4444';
                if (e.type === 'base') color = e.team === 'blue' ? '#000088' : '#880000';
                if (e.type === 'building' && e.function === 'defense') color = '#888';
                
                ctx.fillStyle = color;
                
                if (e.type === 'unit') {
                     // Draw Circle for units
                     ctx.beginPath();
                     ctx.arc(x + w/2, y + h/2, Math.min(w,h) * 0.3, 0, Math.PI * 2);
                     ctx.fill();
                     ctx.strokeStyle = '#fff';
                     ctx.stroke();
                } else {
                    // Draw Rect for buildings
                    ctx.fillRect(x + 2, y + 2, w - 4, h - 4);
                    ctx.strokeStyle = '#fff';
                    ctx.strokeRect(x+2, y+2, w-4, h-4);
                }
                
                // HP Bar
                const hpPct = Math.max(0, e.hp / e.max_hp);
                ctx.fillStyle = '#333';
                ctx.fillRect(x, y - 6, w, 4);
                ctx.fillStyle = hpPct > 0.5 ? '#0f0' : '#f00';
                ctx.fillRect(x, y - 6, w * hpPct, 4);
                
                // Label
                if (e.type !== 'base') {
                     // ctx.fillStyle = '#fff';
                     // ctx.font = '10px Arial';
                     // ctx.fillText(e.type[0].toUpperCase(), x + w/2 - 3, y + h/2 + 3);
                }
            });
            
            // Draw Mana/Stats (Overlay)
            ctx.fillStyle = '#fff';
            ctx.font = '16px Arial';
            ctx.textAlign = 'left';
            ctx.fillText(`Blue HP: ${state.players.blue.hp.toFixed(0)} | Mana: ${state.players.blue.mana}`, 10, 30);
            ctx.textAlign = 'right';
            ctx.fillText(`Red HP: ${state.players.red.hp.toFixed(0)} | Mana: ${state.players.red.mana}`, CANVAS_W - 10, 30);
            
            if (replayData.winner) {
                 ctx.textAlign = 'center';
                 ctx.font = '30px Arial';
                 ctx.fillText(`Winner: ${replayData.winner.toUpperCase()}`, CANVAS_W/2, 50);
            }
        }
        
        // Initial render
        render(0);
    </script>
</body>
</html>
