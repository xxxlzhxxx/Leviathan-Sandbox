<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leviathan Sandbox - Replay Viewer</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #1e1e1e;
            color: #d4d4d4;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #569cd6;
        }
        #controls {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        #fileInput {
            display: none;
        }
        .btn {
            background-color: #0e639c;
            color: white;
            padding: 8px 16px;
            border: none;
            cursor: pointer;
            font-size: 14px;
        }
        .btn:hover {
            background-color: #1177bb;
        }
        #canvas-container {
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        canvas {
            background-color: #252526;
            border: 1px solid #3c3c3c;
        }
        #status {
            margin-top: 10px;
            font-size: 18px;
        }
        .legend {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #3c3c3c;
            background-color: #252526;
            text-align: left;
            font-size: 14px;
        }
        .legend span {
            margin-right: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Leviathan Sandbox (利维坦沙箱) <small>Replay Viewer</small></h1>
    
    <div class="container">
        <div id="status">Select a replay.json file to watch the battle.</div>
        <button class="btn" onclick="document.getElementById('fileInput').click()" style="margin-bottom: 15px;">📂 Select Replay File</button>
        <input type="file" id="fileInput" accept=".json">
        
        <div>
            <canvas id="gameCanvas" width="800" height="400"></canvas>
        </div>
        
        <div class="controls">
            <button id="playBtn">▶ Play</button>
            <button id="pauseBtn">⏸ Pause</button>
            <input type="range" id="timeline" min="0" max="0" value="0">
            <span id="tickDisplay">Tick: 0</span>
        </div>
        <div style="margin-top: 10px; font-size: 0.9em; color: #888; text-align: center;">
            <strong>Legend:</strong> 
            <span style="color: #4488ff;">K</span>=Knight 
            <span style="color: #4488ff;">A</span>=Archer 
            <span style="color: #4488ff;">G</span>=Goblin 
            <span style="color: #4488ff;">O</span>=Orc |
            <span style="color: #888;">W</span>=Wall 
            <span style="color: #888;">T</span>=Turret
        </div>
        <div style="margin-top: 5px; font-size: 0.9em; color: #888;">
            Blue Base (Left) vs Red Base (Right)
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const status = document.getElementById('status');
        const timeline = document.getElementById('timeline');
        const tickDisplay = document.getElementById('tickDisplay');
        const playBtn = document.getElementById('playBtn');
        const pauseBtn = document.getElementById('pauseBtn');

        let replayData = null;
        let currentTick = 0;
        let isPlaying = false;
        let animationId = null;
        const FPS = 2; // Slowed down from 30 to 2 for better visibility

        // Grid Config
        const GRID_W = 20;
        const GRID_H = 3;
        const CELL_SIZE = 80; 
        const GRID_OFFSET_X = 20; // Padding for base HP bars
        const CANVAS_W = 1200 + (GRID_OFFSET_X * 2); // Add padding to width
        const CANVAS_H = 300;
        
        // Update Canvas Size
        canvas.width = CANVAS_W;
        canvas.height = CANVAS_H;

        // Preload Images
        const assets = {};
        const assetNames = ["knight", "archer", "goblin", "orc", "catapult", "wall", "turret", "base"];
        assetNames.forEach(name => {
            const img = new Image();
            // Since we are running locally and opening index.html directly,
            // we should assume the assets are in a relative path.
            // However, the assets were moved to core/objects/...
            // For simple local viewing, it's easier to keep a copy in web/assets.
            // But the user asked to put them in objects folder.
            // To make index.html load them, we would need to know the relative path structure or copy them back.
            // Since index.html is in web/, and objects are in ../core/objects/, browsers might block loading local files outside root.
            // Best practice for this "static site" is to keep assets in web/assets for the frontend.
            // The user wanted "generated pictures should be put into objects folder".
            // So I did that. Now I should probably COPY them back to web/assets or symlink so the web player can see them.
            // I already copied them in the previous step (cp command).
            // So they are BOTH in objects/.. and web/assets/.
            // So this path is correct:
            img.src = `assets/${name}.png`;
            assets[name] = img;
        });

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    replayData = JSON.parse(e.target.result);
                    status.textContent = `Loaded match: ${replayData.match_id} (${replayData.ticks.length} ticks)`;
                    timeline.max = replayData.ticks.length - 1;
                    currentTick = 0;
                    timeline.value = 0;
                    render(0);
                } catch (err) {
                    status.textContent = "Error parsing JSON: " + err.message;
                }
            };
            reader.readAsText(file);
        });

        playBtn.addEventListener('click', () => {
            if (!replayData) return;
            if (isPlaying) return;
            isPlaying = true;
            loop();
        });

        pauseBtn.addEventListener('click', () => {
            isPlaying = false;
            cancelAnimationFrame(animationId);
        });

        timeline.addEventListener('input', (e) => {
            if (!replayData) return;
            currentTick = parseInt(e.target.value);
            render(currentTick);
        });

        function loop() {
            if (!isPlaying) return;
            
            currentTick++;
            if (currentTick >= replayData.ticks.length) {
                currentTick = 0; // Loop or stop? Let's stop
                isPlaying = false;
                return;
            }
            
            timeline.value = currentTick;
            render(currentTick);
            
            // Throttling for speed control could be added here
            setTimeout(() => {
                animationId = requestAnimationFrame(loop);
            }, 1000 / FPS);
        }

        function render(tickIndex) {
            tickDisplay.textContent = `Tick: ${tickIndex}`;
            
            // Clear
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Apply Grid Offset
            ctx.save();
            ctx.translate(GRID_OFFSET_X, 0);
            
            // Draw Lanes
            ctx.strokeStyle = 'rgba(255,255,255,0.2)';
            ctx.lineWidth = 1;
            const LANE_HEIGHT = CANVAS_H / GRID_H;
            const PLAY_AREA_W = 1200; // Fixed width for gameplay area
            const COL_WIDTH = PLAY_AREA_W / GRID_W;

            for (let y = 0; y <= GRID_H; y++) {
                ctx.beginPath();
                ctx.moveTo(0, y * LANE_HEIGHT);
                ctx.lineTo(PLAY_AREA_W, y * LANE_HEIGHT);
                ctx.stroke();
            }
            // Vertical lines
             for (let x = 0; x <= GRID_W; x++) {
                ctx.beginPath();
                ctx.moveTo(x * COL_WIDTH, 0);
                ctx.lineTo(x * COL_WIDTH, CANVAS_H);
                ctx.stroke();
            }

            // Draw Base Areas (Background)
            // Blue Base Area (Col 0)
            ctx.fillStyle = 'rgba(0, 0, 255, 0.1)';
            ctx.fillRect(0, 0, COL_WIDTH, CANVAS_H);
            // Red Base Area (Col 19)
            ctx.fillStyle = 'rgba(255, 0, 0, 0.1)';
            ctx.fillRect((GRID_W - 1) * COL_WIDTH, 0, COL_WIDTH, CANVAS_H);
            
            // Build Zones (First 5 cols)
            ctx.fillStyle = 'rgba(0, 0, 255, 0.05)';
            ctx.fillRect(COL_WIDTH, 0, COL_WIDTH * 4, CANVAS_H); // Col 1-4
            
            ctx.fillStyle = 'rgba(255, 0, 0, 0.05)';
            ctx.fillRect((GRID_W - 5) * COL_WIDTH, 0, COL_WIDTH * 4, CANVAS_H); // Col 15-18

            if (replayData && replayData.ticks[tickIndex]) {
                const state = replayData.ticks[tickIndex];

                // Group entities by position for stacking visualization
                const entityMap = {};
                state.entities.forEach(e => {
                    const key = `${e.x},${e.y}`;
                    if (!entityMap[key]) entityMap[key] = [];
                    entityMap[key].push(e);
                });

                // Draw Entities
                Object.keys(entityMap).forEach(key => {
                    const stack = entityMap[key];
                    
                    stack.forEach((e, index) => {
                        const offset = (stack.length > 1) ? (index * 5) - ((stack.length-1)*2.5) : 0;
                        
                        const x = e.x * COL_WIDTH + offset;
                        const y = e.y * LANE_HEIGHT + offset;
                        const w = e.width * COL_WIDTH;
                        const h = e.height * LANE_HEIGHT;
                        
                        // Color (Fallback)
                        let color = e.team === 'blue' ? '#4488ff' : '#ff4444';
                        if (e.type === 'base') color = e.team === 'blue' ? '#000088' : '#880000';
                        if (e.type === 'building' && e.function === 'defense') color = '#888';
                        
                        ctx.fillStyle = color;
                        
                        // Try to draw Image
                        const img = assets[e.subtype];
                        if (img && img.complete && img.naturalHeight !== 0) {
                            ctx.save();
                            if (e.team === 'red') {
                                ctx.translate(x + w, y);
                                ctx.scale(-1, 1);
                                ctx.drawImage(img, 0, 0, w, h);
                            } else {
                                ctx.drawImage(img, x, y, w, h);
                            }
                            ctx.restore();
                            
                            if (e.team === 'blue') ctx.strokeStyle = 'rgba(100, 200, 255, 0.5)';
                            else ctx.strokeStyle = 'rgba(255, 100, 100, 0.5)';
                            ctx.lineWidth = 2;
                            ctx.strokeRect(x, y, w, h);
                            
                        } else {
                            // Fallback drawing
                            if (e.type === 'unit') {
                                 ctx.beginPath();
                                 ctx.arc(x + w/2, y + h/2, Math.min(w,h) * 0.3, 0, Math.PI * 2);
                                 ctx.fill();
                                 ctx.strokeStyle = '#fff';
                                 ctx.stroke();
                            } else {
                                ctx.fillRect(x + 2, y + 2, w - 4, h - 4);
                                ctx.strokeStyle = '#fff';
                                ctx.strokeRect(x+2, y+2, w-4, h-4);
                            }
                        }
                        
                        // HP Bar Logic
                        const hpPct = Math.max(0, e.hp / e.max_hp);
                        
                        if (e.type === 'base') {
                            // Vertical HP Bar for Base
                            const barW = 10;
                            const barH = h;
                            let barX;
                            
                            if (e.team === 'blue') {
                                // Left side of base (Outside grid)
                                barX = x - barW - 5;
                            } else {
                                // Right side of base (Outside grid)
                                barX = x + w + 5;
                            }
                            
                            ctx.fillStyle = '#333';
                            ctx.fillRect(barX, y, barW, barH);
                            
                            const fillH = barH * hpPct;
                            ctx.fillStyle = hpPct > 0.5 ? '#0f0' : '#f00';
                            ctx.fillRect(barX, y + (barH - fillH), barW, fillH);
                            
                            ctx.strokeStyle = '#fff';
                            ctx.lineWidth = 1;
                            ctx.strokeRect(barX, y, barW, barH);
                            
                        } else {
                            // Standard Horizontal HP Bar for Units
                            // Overlay on top of the unit image, semi-transparent
                            const barW = w - 4;
                            const barH = 4;
                            const barX = x + 2;
                            const barY = y + 2; // Top of the unit
                            
                            // Background (Semi-transparent black)
                            ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
                            ctx.fillRect(barX, barY, barW, barH);
                            
                            // Fill
                            ctx.fillStyle = hpPct > 0.5 ? 'rgba(0, 255, 0, 0.8)' : 'rgba(255, 0, 0, 0.8)';
                            ctx.fillRect(barX, barY, barW * hpPct, barH);
                        }
                    });
                    
                    // Stack Count Indicator
                    if (stack.length > 1) {
                         const e = stack[0];
                         const x = e.x * COL_WIDTH;
                         const y = e.y * LANE_HEIGHT;
                         
                         ctx.fillStyle = 'white';
                         ctx.font = 'bold 14px Arial';
                         ctx.textAlign = 'right';
                         ctx.fillText(`x${stack.length}`, x + COL_WIDTH - 5, y + LANE_HEIGHT - 5);
                    }
                });
            }
            
            ctx.restore(); // End Translation

            // Draw Mana/Stats (Overlay)
            // Use replayData state if available, else render static or previous
            if (replayData && replayData.ticks[tickIndex]) {
                const state = replayData.ticks[tickIndex];
                ctx.fillStyle = '#fff';
                ctx.font = '16px Arial';
                ctx.textAlign = 'left';
                ctx.fillText(`Blue HP: ${state.players.blue.hp.toFixed(0)} | Mana: ${state.players.blue.mana}`, 20, 30); // Adjusted for margin
                ctx.textAlign = 'right';
                ctx.fillText(`Red HP: ${state.players.red.hp.toFixed(0)} | Mana: ${state.players.red.mana}`, CANVAS_W - 20, 30); // Adjusted for margin
                
                if (replayData.winner) {
                     ctx.textAlign = 'center';
                     ctx.font = '30px Arial';
                     ctx.fillText(`Winner: ${replayData.winner.toUpperCase()}`, CANVAS_W/2, 50);
                }
            }
        }
        
        // Initial render
        render(0);
    </script>
</body>
</html>
