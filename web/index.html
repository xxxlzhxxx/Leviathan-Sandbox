<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leviathan Sandbox - Replay Viewer</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #1e1e1e;
            color: #d4d4d4;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #569cd6;
        }
        #controls {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        #fileInput {
            display: none;
        }
        .btn {
            background-color: #0e639c;
            color: white;
            padding: 8px 16px;
            border: none;
            cursor: pointer;
            font-size: 14px;
        }
        .btn:hover {
            background-color: #1177bb;
        }
        #canvas-container {
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        canvas {
            background-color: #252526;
            border: 1px solid #3c3c3c;
        }
        #status {
            margin-top: 10px;
            font-size: 18px;
        }
        .legend {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #3c3c3c;
            background-color: #252526;
            text-align: left;
            font-size: 14px;
        }
        .legend span {
            margin-right: 15px;
            font-weight: bold;
        }
        #lang-switch {
            position: absolute;
            top: 20px;
            right: 20px;
        }
        .lang-btn {
            background-color: #252526;
            color: #888;
            border: 1px solid #3c3c3c;
            padding: 5px 10px;
            cursor: pointer;
        }
        .lang-btn.active {
            background-color: #0e639c;
            color: white;
            border-color: #0e639c;
        }
    </style>
</head>
<body>
    <div id="lang-switch">
        <button class="lang-btn" id="btn-en" onclick="setLanguage('en')">English</button>
        <button class="lang-btn active" id="btn-zh" onclick="setLanguage('zh')">中文</button>
    </div>

    <h1>Leviathan Sandbox <small id="title-suffix" data-i18n="title_suffix">Replay Viewer</small></h1>
    
    <div class="container">
        <div id="status" data-i18n="status_select">Select a replay.json file to watch the battle.</div>
        <button class="btn" onclick="document.getElementById('fileInput').click()" style="margin-bottom: 15px;" id="btn-select" data-i18n="btn_select">📂 Select Replay File</button>
        <input type="file" id="fileInput" accept=".json">
        
        <div>
            <canvas id="gameCanvas" width="800" height="400"></canvas>
        </div>
        
        <div class="controls">
            <button id="playBtn" data-i18n="btn_play">▶ Play</button>
            <button id="pauseBtn" data-i18n="btn_pause">⏸ Pause</button>
            <input type="range" id="timeline" min="0" max="0" value="0">
            <span id="tickDisplay">Tick: 0</span>
        </div>
        <div style="margin-top: 10px; font-size: 0.9em; color: #888; text-align: center;">
            <strong data-i18n="legend">Legend:</strong> 
            <span style="color: #4488ff;" data-i18n="unit_knight">K=Knight</span> 
            <span style="color: #4488ff;" data-i18n="unit_archer">A=Archer</span> 
            <span style="color: #4488ff;" data-i18n="unit_goblin">G=Goblin</span> 
            <span style="color: #4488ff;" data-i18n="unit_orc">O=Orc</span> |
            <span style="color: #888;" data-i18n="unit_wall">W=Wall</span> 
            <span style="color: #888;" data-i18n="unit_turret">T=Turret</span>
        </div>
        <div style="margin-top: 5px; font-size: 0.9em; color: #888;" data-i18n="base_info">
            Blue Base (Left) vs Red Base (Right)
        </div>
    </div>

    <script>
        // Language Configuration
        const translations = {
            en: {
                title_suffix: "Replay Viewer",
                status_select: "Select a replay.json file to watch the battle.",
                status_loaded: "Loaded match:",
                status_error: "Error parsing JSON:",
                btn_select: "📂 Select Replay File",
                btn_play: "▶ Play",
                btn_pause: "⏸ Pause",
                legend: "Legend:",
                unit_knight: "K=Knight",
                unit_archer: "A=Archer",
                unit_goblin: "G=Goblin",
                unit_orc: "O=Orc",
                unit_wall: "W=Wall",
                unit_turret: "T=Turret",
                base_info: "Blue Base (Left) vs Red Base (Right)",
                tick: "Tick:",
                winner: "Winner:",
                blue_stats: "Blue HP:",
                red_stats: "Red HP:",
                mana: "Mana:",
                draw: "DRAW"
            },
            zh: {
                title_suffix: "回放查看器",
                status_select: "请选择一个 replay.json 录像文件进行观看。",
                status_loaded: "已加载比赛:",
                status_error: "解析 JSON 错误:",
                btn_select: "📂 选择录像文件",
                btn_play: "▶ 播放",
                btn_pause: "⏸ 暂停",
                legend: "图例:",
                unit_knight: "K=骑士",
                unit_archer: "A=弓箭手",
                unit_goblin: "G=哥布林",
                unit_orc: "O=兽人",
                unit_wall: "W=城墙",
                unit_turret: "T=防御塔",
                base_info: "蓝方基地 (左) vs 红方基地 (右)",
                tick: "时间步:",
                winner: "获胜者:",
                blue_stats: "蓝方血量:",
                red_stats: "红方血量:",
                mana: "魔法:",
                draw: "平局"
            }
        };

        let currentLang = 'zh'; // Default to Chinese

        function setLanguage(lang) {
            currentLang = lang;
            
            // Update UI Buttons
            document.getElementById('btn-en').classList.remove('active');
            document.getElementById('btn-zh').classList.remove('active');
            document.getElementById(`btn-${lang}`).classList.add('active');

            // Update Static Text
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang][key]) {
                    el.textContent = translations[lang][key];
                }
            });

            // Trigger re-render to update dynamic text
            if (replayData) {
                render(currentPlaybackTick);
            }
        }

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const status = document.getElementById('status');
        const timeline = document.getElementById('timeline');
        const tickDisplay = document.getElementById('tickDisplay');
        const playBtn = document.getElementById('playBtn');
        const pauseBtn = document.getElementById('pauseBtn');

        let replayData = null;
        let playbackSpeed = 2;
        let lastFrameTime = 0;
        let currentPlaybackTick = 0.0;
        let isPlaying = false;
        let animationId = null;

        const GRID_W = 24;
        const GRID_H = 3;
        const CELL_SIZE = 80; 
        const GRID_OFFSET_X = 20;
        const CANVAS_W = 1200 + (GRID_OFFSET_X * 2);
        const CANVAS_H = 300;
        
        canvas.width = CANVAS_W;
        canvas.height = CANVAS_H;

        const assets = {};
        const assetNames = ["knight", "archer", "goblin", "orc", "catapult", "wall", "turret", "base"];
        
        const SPRITE_SIZE = 128;
        const ANIMATION_FRAMES = 8;
        
        assetNames.forEach(name => {
            const imgBlue = new Image();
            imgBlue.src = `assets/${name}_blue.png`;
            assets[`${name}_blue`] = imgBlue;
            
            const imgRed = new Image();
            imgRed.src = `assets/${name}_red.png`;
            assets[`${name}_red`] = imgRed;
            
            // Load animations for all units
            const moveBlue = new Image();
            moveBlue.src = `assets_animated/${name}_move_blue.png`;
            assets[`${name}_move_blue`] = moveBlue;
            
            const moveRed = new Image();
            moveRed.src = `assets_animated/${name}_move_red.png`;
            assets[`${name}_move_red`] = moveRed;
            
            const attackBlue = new Image();
            attackBlue.src = `assets_animated/${name}_attack_blue.png`;
            assets[`${name}_attack_blue`] = attackBlue;
            
            const attackRed = new Image();
            attackRed.src = `assets_animated/${name}_attack_red.png`;
            assets[`${name}_attack_red`] = attackRed;
        });

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    replayData = JSON.parse(e.target.result);
                    status.textContent = `${translations[currentLang].status_loaded} ${replayData.match_id} (${replayData.ticks.length} ticks)`;
                    timeline.max = replayData.ticks.length - 1;
                    currentPlaybackTick = 0;
                    timeline.value = 0;
                    render(0);
                } catch (err) {
                    status.textContent = `${translations[currentLang].status_error} ` + err.message;
                }
            };
            reader.readAsText(file);
        });

        playBtn.addEventListener('click', () => {
            if (!replayData) return;
            if (isPlaying) return;
            isPlaying = true;
            lastFrameTime = performance.now();
            loop();
        });

        pauseBtn.addEventListener('click', () => {
            isPlaying = false;
            cancelAnimationFrame(animationId);
        });

        timeline.addEventListener('input', (e) => {
            if (!replayData) return;
            currentPlaybackTick = parseFloat(e.target.value);
            render(currentPlaybackTick);
        });

        function loop(timestamp) {
            if (!isPlaying) return;
            
            const deltaTime = (timestamp - lastFrameTime) / 1000;
            lastFrameTime = timestamp;
            
            currentPlaybackTick += deltaTime * playbackSpeed;
            
            if (currentPlaybackTick >= replayData.ticks.length - 1) {
                currentPlaybackTick = replayData.ticks.length - 1;
                isPlaying = false;
                render(currentPlaybackTick);
                return;
            }
            
            timeline.value = currentPlaybackTick;
            render(currentPlaybackTick);
            
            animationId = requestAnimationFrame(loop);
        }

        function render(tickFloat) {
            const t = translations[currentLang]; // Short alias for current translations
            const tickIndex = Math.floor(tickFloat);
            const nextTickIndex = Math.min(tickIndex + 1, replayData.ticks.length - 1);
            const alpha = tickFloat - tickIndex;
            
            tickDisplay.textContent = `${t.tick} ${tickIndex}`;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(GRID_OFFSET_X, 0);
            
            const LANE_HEIGHT = CANVAS_H / GRID_H;
            const PLAY_AREA_W = 1200;
            const COL_WIDTH = PLAY_AREA_W / GRID_W;

            ctx.strokeStyle = 'rgba(255,255,255,0.2)';
            ctx.lineWidth = 1;
            for (let y = 0; y <= GRID_H; y++) {
                ctx.beginPath();
                ctx.moveTo(0, y * LANE_HEIGHT);
                ctx.lineTo(PLAY_AREA_W, y * LANE_HEIGHT);
                ctx.stroke();
            }
            for (let x = 0; x <= GRID_W; x++) {
                ctx.beginPath();
                ctx.moveTo(x * COL_WIDTH, 0);
                ctx.lineTo(x * COL_WIDTH, CANVAS_H);
                ctx.stroke();
            }

            ctx.fillStyle = 'rgba(0, 0, 255, 0.1)';
            ctx.fillRect(0, 0, COL_WIDTH * 3, CANVAS_H);
            ctx.fillStyle = 'rgba(255, 0, 0, 0.1)';
            ctx.fillRect((GRID_W - 3) * COL_WIDTH, 0, COL_WIDTH * 3, CANVAS_H);
            
            ctx.fillStyle = 'rgba(0, 0, 255, 0.05)';
            ctx.fillRect(COL_WIDTH * 3, 0, COL_WIDTH * 4, CANVAS_H);
            ctx.fillStyle = 'rgba(255, 0, 0, 0.05)';
            ctx.fillRect((GRID_W - 7) * COL_WIDTH, 0, COL_WIDTH * 4, CANVAS_H);

            if (replayData && replayData.ticks[tickIndex]) {
                const state = replayData.ticks[tickIndex];
                const nextState = replayData.ticks[nextTickIndex];

                const findEntity = (s, id) => s.entities.find(e => e.id === id);
                const sortedEntities = [...state.entities].sort((a,b) => a.y - b.y);

                sortedEntities.forEach(e => {
                    let drawX = e.x;
                    let drawY = e.y;
                    
                    const nextE = findEntity(nextState, e.id);
                    if (nextE) {
                        drawX = e.x + (nextE.x - e.x) * alpha;
                        drawY = e.y + (nextE.y - e.y) * alpha;
                    }
                    
                    let action = 'idle';
                    let frameIndex = 0;
                    let bobY = 0;
                    let tilt = 0; 

                    if (e.type === 'unit') {
                        if (nextE && (nextE.x !== e.x || nextE.y !== e.y)) {
                            action = 'move';
                            frameIndex = Math.floor(currentPlaybackTick * 8) % ANIMATION_FRAMES;
                            bobY = Math.sin(tickFloat * 15) * 2.0; 
                            tilt = Math.sin(tickFloat * 10) * 0.1;
                        } else {
                            if (Math.floor(currentPlaybackTick / 20) % 2 === 1) {
                                action = 'attack';
                                frameIndex = Math.floor(currentPlaybackTick * 10) % ANIMATION_FRAMES;
                            } else {
                                frameIndex = Math.floor(currentPlaybackTick * 2) % ANIMATION_FRAMES;
                                action = 'idle'; 
                            }
                        }
                    }

                    const x = drawX * COL_WIDTH;
                    const y = drawY * LANE_HEIGHT + bobY;
                    const w = e.width * COL_WIDTH;
                    const h = e.height * LANE_HEIGHT;
                    
                    // Draw Shadow
                    ctx.save();
                    ctx.fillStyle = 'rgba(0,0,0,0.3)';
                    ctx.beginPath();
                    ctx.ellipse(x + w/2, y + h - 5, w/2.5, h/5, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                    
                    let color = e.team === 'blue' ? '#4488ff' : '#ff4444';
                    if (e.type === 'base') color = e.team === 'blue' ? '#000088' : '#880000';
                    if (e.type === 'building' && e.function === 'defense') color = '#888';
                    ctx.fillStyle = color;
                    
                    let imgKey = `${e.subtype}_${e.team}`;
                    let isSpriteSheet = false;
                    
                    // All units now have animations
                    if (action === 'move') {
                        const key = `${e.subtype}_move_${e.team}`;
                        if (assets[key] && assets[key].complete) {
                            imgKey = key;
                            isSpriteSheet = true;
                        }
                    } else if (action === 'attack') {
                         const key = `${e.subtype}_attack_${e.team}`;
                         if (assets[key] && assets[key].complete) {
                             imgKey = key;
                             isSpriteSheet = true;
                         }
                    } else {
                        // For idle, try to use move frame 0 if static base is not great, 
                        // but static base is fine too. Let's try to use move sheet if it exists
                        const key = `${e.subtype}_move_${e.team}`;
                         if (assets[key] && assets[key].complete) {
                             imgKey = key;
                             isSpriteSheet = true;
                         }
                    }
                    
                    const img = assets[imgKey];
                    
                    if (img && img.complete && img.naturalHeight !== 0) {
                        ctx.save();
                        ctx.translate(x + w/2, y + h); 
                        ctx.rotate(tilt);
                        ctx.translate(-(x + w/2), -(y + h));
                        
                        if (isSpriteSheet) {
                             const sx = frameIndex * SPRITE_SIZE;
                             const sy = 0;
                             // Assets are pre-flipped in pipeline. Blue=Right, Red=Left.
                             ctx.drawImage(img, sx, sy, SPRITE_SIZE, SPRITE_SIZE, x, y, w, h);
                        } else {
                             // Static assets are also pre-flipped in pipeline now.
                             ctx.drawImage(img, x, y, w, h);
                        }
                        ctx.restore();
                        
                        ctx.save();
                        if (e.team === 'blue') ctx.strokeStyle = 'rgba(100, 200, 255, 0.5)';
                        else ctx.strokeStyle = 'rgba(255, 100, 100, 0.5)';
                        ctx.lineWidth = 2;
                        ctx.strokeRect(x, y, w, h);
                        ctx.restore();
                        
                    } else {
                        if (e.type === 'unit') {
                             ctx.beginPath();
                             ctx.arc(x + w/2, y + h/2, Math.min(w,h) * 0.3, 0, Math.PI * 2);
                             ctx.fill();
                             ctx.strokeStyle = '#fff';
                             ctx.stroke();
                        } else {
                            ctx.fillRect(x + 2, y + 2, w - 4, h - 4);
                            ctx.strokeStyle = '#fff';
                            ctx.strokeRect(x+2, y+2, w-4, h-4);
                        }
                    }
                    
                    if (nextE && nextE.hp < e.hp) {
                        if (e.type === 'unit') {
                            ctx.save();
                            ctx.beginPath();
                            const direction = e.team === 'blue' ? 1 : -1;
                            const arcX = x + w/2 + (direction * w * 0.5);
                            const arcY = y + h/2;
                            ctx.arc(arcX, arcY, w * 0.8, -Math.PI/4, Math.PI/4, e.team === 'red'); 
                            ctx.strokeStyle = 'rgba(255, 255, 255, 0.8)';
                            ctx.lineWidth = 3;
                            ctx.stroke();
                            ctx.restore();
                        }

                        ctx.save();
                        ctx.globalCompositeOperation = 'source-atop';
                        ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                        ctx.fillRect(x, y, w, h);
                        ctx.restore();
                        
                        ctx.fillStyle = '#ff0000';
                        ctx.font = 'bold 16px Arial';
                        ctx.fillText(`-${(e.hp - nextE.hp).toFixed(0)}`, x + w/2, y - 10 + bobY);
                    }
                    
                    const hpPct = e.hp / e.max_hp;

                    if (e.type === 'base') {
                        const barW = 10;
                        const barH = h;
                        let barX;
                        
                        if (e.team === 'blue') {
                            barX = x - barW - 5;
                        } else {
                            barX = x + w + 5;
                        }
                        
                        ctx.fillStyle = '#333';
                        ctx.fillRect(barX, y, barW, barH);
                        
                        const fillH = barH * hpPct;
                        ctx.fillStyle = hpPct > 0.5 ? '#0f0' : '#f00';
                        ctx.fillRect(barX, y + (barH - fillH), barW, fillH);
                        
                        ctx.strokeStyle = '#fff';
                        ctx.lineWidth = 1;
                        ctx.strokeRect(barX, y, barW, barH);
                        
                    } else {
                        const barW = w - 4;
                        const barH = 4;
                        const barX = x + 2;
                        const barY = y + 2;
                        
                        ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
                        ctx.fillRect(barX, barY, barW, barH);
                        
                        ctx.fillStyle = hpPct > 0.5 ? 'rgba(0, 255, 0, 0.8)' : 'rgba(255, 0, 0, 0.8)';
                        ctx.fillRect(barX, barY, barW * hpPct, barH);
                    }
                });
            }
            
            ctx.restore();

            if (replayData && replayData.ticks[tickIndex]) {
                const state = replayData.ticks[tickIndex];
                ctx.fillStyle = '#fff';
                ctx.font = '16px Arial';
                ctx.textAlign = 'left';
                const blueStats = `${t.blue_stats} ${state.players.blue.hp.toFixed(0)} | ${t.mana} ${state.players.blue.mana}`;
                ctx.fillText(blueStats, 20, 30);
                
                ctx.textAlign = 'right';
                const redStats = `${t.red_stats} ${state.players.red.hp.toFixed(0)} | ${t.mana} ${state.players.red.mana}`;
                ctx.fillText(redStats, CANVAS_W - 20, 30);
                
                if (replayData.winner) {
                     ctx.textAlign = 'center';
                     ctx.font = '30px Arial';
                     const winnerText = replayData.winner === 'draw' ? t.draw : replayData.winner.toUpperCase();
                     ctx.fillText(`${t.winner} ${winnerText}`, CANVAS_W/2, 50);
                }
            }
        }
        
        // Initialize Language
        setLanguage(currentLang);
    </script>
</body>
</html>
